<div class="modal-backdrop" (click)="close()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="close()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M14 4L4 14M4 4l10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="modal-header">
      <div class="logo-mark">QM</div>
      <h2>{{ mode() === 'login' ? 'Welcome back' : 'Create account' }}</h2>
      <p>{{ mode() === 'login' ? 'Sign in to access your conversion history' : 'Join to save and track your conversions' }}</p>
    </div>

    <div class="tab-bar">
      <button [class.active]="mode() === 'login'" (click)="switchMode('login')">Sign in</button>
      <button [class.active]="mode() === 'register'" (click)="switchMode('register')">Register</button>
    </div>

    <div class="error-banner" *ngIf="error()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 5v3.5M8 11v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      {{ error() }}
    </div>

    <!-- LOGIN FORM -->
    <form *ngIf="mode() === 'login'" (ngSubmit)="submit()" class="auth-form">
      <div class="field">
        <label>Username</label>
        <input type="text" [(ngModel)]="loginForm.username" name="username"
               placeholder="Enter your username" required autocomplete="username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" [(ngModel)]="loginForm.password" name="password"
               placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading()">
        <span *ngIf="!loading()">Sign In</span>
        <span *ngIf="loading()" class="spinner"></span>
      </button>
    </form>

    <!-- REGISTER FORM -->
    <form *ngIf="mode() === 'register'" (ngSubmit)="submit()" class="auth-form">
      <div class="field">
        <label>Username</label>
        <input type="text" [(ngModel)]="registerForm.username" name="username"
               placeholder="Choose a username" minlength="3" required autocomplete="username"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" [(ngModel)]="registerForm.email" name="email"
               placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" [(ngModel)]="registerForm.password" name="password"
               placeholder="Min. 6 characters" minlength="6" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading()">
        <span *ngIf="!loading()">Create Account</span>
        <span *ngIf="loading()" class="spinner"></span>
      </button>
    </form>

    <p class="switch-hint">
      <ng-container *ngIf="mode() === 'login'">
        No account? <button type="button" (click)="switchMode('register')">Create one free →</button>
      </ng-container>
      <ng-container *ngIf="mode() === 'register'">
        Already have an account? <button type="button" (click)="switchMode('login')">Sign in</button>
      </ng-container>
    </p>
  </div>
</div>
